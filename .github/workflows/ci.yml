# PR 게이트. develop/main으로 가는 PR마다 실행 → 그린이어야 머지(branch protection).
# 핵심 원칙: CI는 로컬 스크립트를 "호출"만 한다(두 벌 관리 X). 같은 biome.json·tsconfig·
# e2e-docker.sh를 그대로 쓴다.
name: CI

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 빠른 게이트(~1–2분, 백엔드 불필요): 타입·린트·빌드·스토리북.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # packageManager 필드에서 버전 읽음
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint # biome check (pre-commit과 동일 기준)
      - run: pnpm knip # 미사용 파일·export·의존성(프로젝트 레벨 dead code)
      - run: pnpm build:local # 빌드 깨짐 감지(env 파일 불필요)
      - run: pnpm build-storybook # 스토리 빌드 회귀 감지(현재 사각지대)

  # E2E(비주얼 회귀 포함): 로컬과 "동일한" e2e-docker.sh를 핀된 컨테이너로 실행한다.
  # 유일한 CI 분기 = 백엔드 출처: 로컬은 형제 체크아웃, CI는 백엔드 레포를 핀된 ref로 체크아웃해
  # BACKEND_DIR로 가리킨다(소스 빌드 = local 프로파일 → mock-login 활성. GHCR :prod 이미지는
  # prod 프로파일이라 mock-login이 꺼져 있어 쓸 수 없음).
  #
  # ⚠️ baseline 결정성: 비주얼 baseline은 특정 백엔드 버전 기준. BACKEND_REF를 baseline 생성
  #    시점과 핀하고, 백엔드를 올릴 땐 baseline 재생성 + 이 ref 갱신(로컬 §백엔드 동기화의 CI판).
  # ⚠️ 첫 그린 확인 전엔 branch protection 필수 체크로 올리지 말 것(레포 설정에서 지정).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # baseline 생성 시점 백엔드 SHA로 핀(#399). 백엔드 올릴 땐 baseline 재생성 + 이 값 갱신.
      BACKEND_REF: 1661f3d8fe409ee17359c0683cd6fca8a558ec1a
    steps:
      - uses: actions/checkout@v4
        with:
          path: cse.snu.ac.kr # 로컬과 동일한 형제 레이아웃 재현
      - uses: actions/checkout@v4
        with:
          repository: wafflestudio/csereal-server # public → 토큰 불필요(GITHUB_TOKEN)
          ref: ${{ env.BACKEND_REF }}
          path: csereal-server-main # = BACKEND_DIR 기본값 ../csereal-server-main
      # 호스트엔 pnpm/node 불필요 — e2e-docker.sh가 모든 걸 핀된 컨테이너 안에서 한다(corepack·
      # pnpm install·빌드·시드·브라우저). 백엔드는 ../csereal-server-main(체크아웃됨)에서 compose가
      # 빌드. host.docker.internal은 Linux 러너에서도 --add-host=host-gateway로 동작(스크립트가 처리).
      - name: E2E (e2e-docker.sh)
        working-directory: cse.snu.ac.kr
        run: bash scripts/e2e-docker.sh
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: cse.snu.ac.kr/playwright-report/
          retention-days: 7
