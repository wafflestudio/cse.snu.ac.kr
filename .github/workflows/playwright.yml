name: E2E (Playwright)

# E2E는 로컬 docker 실서버(MySQL+Spring)를 띄워 prod 빌드를 검증한다(MSW 없음).
# 로컬·CI 동일 경로: scripts/e2e-docker.sh 가 백엔드를 호스트 docker로 보장하고,
# 테스트는 핀된 Playwright 컨테이너 안에서 host.docker.internal로 접근하며 돈다.
# baseline은 그 컨테이너가 렌더 → 로컬 재생성과 픽셀 일치(Linux 단일 baseline).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 수동 트리거: Linux baseline(*-linux.png) 생성. CI(#399 + 핀된 컨테이너)가 정본
  # 렌더 환경이므로 baseline은 여기서 만든다(로컬 백엔드 버전에 의존하지 않음).
  # 실행 → linux-baselines 아티팩트 다운로드 → tests/에 풀어 커밋.
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate Linux visual baselines and upload as artifact'
        type: boolean
        default: true

env:
  # CI가 빌드할 백엔드. upstream main HEAD = #399(1661f3d) = FE main이 그린인 상태.
  # fork로 바꾸려면 여기만 수정(예: yeolyi/csereal-server).
  BACKEND_REPO: wafflestudio/csereal-server
  BACKEND_REF: main
  # 백엔드 소스 위치(워크스페이스 내). e2e-docker.sh 가 여기서 compose up 한다.
  BACKEND_DIR: csereal-server

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPO }}
          ref: ${{ env.BACKEND_REF }}
          path: csereal-server

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('csereal-server/**/*.gradle*', 'csereal-server/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 백엔드 Dockerfile은 prebuilt JAR을 COPY하므로 먼저 빌드한다(테스트 제외).
      # e2e-docker.sh 의 docker compose up 이 이 JAR로 이미지를 빌드한다.
      - name: Build backend JAR
        working-directory: csereal-server
        run: ./gradlew bootJar -x test --no-daemon

      # pnpm store는 컨테이너가 호스트 .pnpm-store로 채운다 → 캐시 대상.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # 기본(push/PR): 백엔드 기동 + 커밋된 Linux baseline에 대조(전부 e2e-docker.sh 안).
      - name: Run E2E
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.update_snapshots) }}
        run: bash scripts/e2e-docker.sh

      # 수동(workflow_dispatch): baseline 재생성 → 산출 PNG를 아티팩트로.
      - name: Regenerate Linux baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots }}
        run: bash scripts/e2e-docker.sh --update-snapshots

      - name: Upload regenerated baselines
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_snapshots && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-baselines
          path: tests/**/*-linux.png
          retention-days: 7

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
