# 프론트 컨테이너 엣지: nginx(:3000 공개) → Hono SSR(127.0.0.1:8787 내부).
# 역할: ① ISR 캐시(익명 read 응답), ② CSP nonce 매 요청 재주입(캐시 히트에도), ③ 정적 에셋.
# 설계 근거: docs/isr-csp-caching-plan.md
user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx/nginx.pid;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log off;
  sendfile on;
  server_tokens off;

  # 컨테이너-로컬 캐시 → 새 배포(새 컨테이너)는 자동으로 콜드(릴리스 간 stale 없음).
  proxy_cache_path /var/cache/nginx/app levels=1:2 keys_zone=app:50m
                   max_size=1g inactive=10m use_temp_path=off;

  upstream hono { server 127.0.0.1:8787; }

  server {
    listen 3000;
    server_name _;

    # sub_filter는 비압축 본문에만 동작 → upstream(Hono)엔 비압축 요청(Hono compress는 no-op).
    proxy_set_header Accept-Encoding "";
    # 치환·캐시 후 nginx가 재압축(text/html은 gzip 기본 대상이라 미기재).
    gzip on;
    gzip_types application/javascript text/css application/json image/svg+xml;

    # 캐시 안 함, 그대로 통과: API·serverFn·storybook·이미지 최적화·sitemap.
    location /api/          { proxy_pass http://hono; }
    location /_serverFn/    { proxy_pass http://hono; }
    location /storybook/    { proxy_pass http://hono; }
    location /img           { proxy_pass http://hono; }
    location = /sitemap.xml { proxy_pass http://hono; }

    # 해시 정적 에셋 → 장기 immutable(Hono가 dist/client 서빙).
    location /assets/ {
      proxy_pass http://hono;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # HTML 문서: ISR 캐시 + nonce 재주입.
    location / {
      proxy_pass http://hono;

      # nonce: 매 요청(캐시 히트 포함) placeholder → $request_id. (sub_filter_types 기본=text/html)
      # placeholder는 entrypoint가 기동마다 랜덤 비밀로 생성해 sub_filter.conf에 박는다
      # (고정 마법문자열이면 공격자가 콘텐츠에 심어 유효 nonce를 받는 우회가 가능 → 비밀로 차단).
      include /etc/nginx/sub_filter.conf;

      # CSP(app/utils/csp.ts에서 생성) + 보안 헤더: nginx 소유, 매 요청 $request_id.
      include /etc/nginx/csp.conf;
      add_header Strict-Transport-Security "max-age=3600" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;

      # 캐시: 익명만(JSESSIONID 있으면 우회). s-maxage 있는 응답만 저장(앱이 결정).
      proxy_cache app;
      # 단일 호스트라 URI만으로 충분(prefix-always). 캐시파일 KEY=URI → 섹션 purge가 스캔.
      proxy_cache_key "$request_uri";
      proxy_cache_bypass $cookie_JSESSIONID;
      proxy_no_cache $cookie_JSESSIONID;
      proxy_cache_background_update on;
      proxy_cache_use_stale updating error timeout;
      add_header X-Cache-Status $upstream_cache_status always;
    }
  }
}
